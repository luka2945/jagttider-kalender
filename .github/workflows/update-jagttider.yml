name: Update Jagttider ICS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"  # mandag 05:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate ICS (all calendars)
        run: python jagttider_to_ics.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Jagttids-Kalender/*.ics
          git diff --cached --quiet || git commit -m "Auto update jagttider (.ics)"
          git push
