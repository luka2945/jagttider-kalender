name: Update Jagttider ICS

on:
  schedule:
    - cron: '0 3 * * 1'  # Hver mandag kl 03
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate ICS
        run: python jagttider_to_ics.py

      - name: Commit file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add jagttider.ics
          git commit -m "Auto update jagttider" || echo "No changes"
          git push
