name: Update Jagttider ICS

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"   # hver mandag 03:17 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate ICS
        run: |
          python jagttider_to_ics.py

      - name: Commit file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add jagttider.ics
          git diff --cached --quiet || git commit -m "Auto update jagttider"
          git push
