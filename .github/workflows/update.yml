name: Update Jagttider ICS

on:
  workflow_dispatch:
  schedule:
    # hver nat kl. 03:15 (UTC) – fint til “set and forget”
    - cron: "15 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate ICS (all calendars)
        run: |
          python jagttider_to_ics.py

      - name: Commit & push if changed
        run: |
          echo "=== Where are the .ics files? ==="
          find . -maxdepth 3 -type f -name "*.ics" -print

          echo "=== Git status BEFORE add ==="
          git status --porcelain

          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"

          # Add all ICS files (even new/untracked ones)
          git add -A

          echo "=== Git status AFTER add ==="
          git status --porcelain

          # Commit only if there is something staged
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto update jagttider (.ics)"
          git push
